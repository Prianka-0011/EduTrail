version: '3.8'

services:
  database-edu-trail:
    image: postgres:15
    container_name: edu-trail-postgres-prod
    restart: always
    env_file:
      - .env-db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - edutrail-network-prod
 
  edu-trail-service:
    container_name: edu-trail-container-prod
    build:
      context: .
      dockerfile: Dockerfile.Production
    env_file:
      - .env-service 
    ports:
      - "5001:5000"
    volumes:
      - ./.devcontainer/local_cert.pfx:/https/https.pfx:ro
    depends_on:
      - database-edu-trail
    networks:
      - edutrail-network-prod

volumes:
  postgres_data_prod:

networks:
  edutrail-network-prod:
    driver: bridge
