version: '3.8'

services:
  database-edu-trail:
    image: postgres:15
    container_name: edu-trail-postgres-prod
    restart: always
    env_file:
      - .env-db
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - edutrail-network-prod

  edu-trail-service:
    container_name: edu-trail-container-prod
    build:
      context: .
      dockerfile: Dockerfile.Production
    env_file:
      - .env-service
    volumes:
      - files_data:/app/_files
      - temp_files_data:/app/_temp-files
    depends_on:
      - database-edu-trail
    networks:
      - edutrail-network-prod

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.edutrail.rule=Host(`mangrovenode.com`)"
      - "traefik.http.routers.edutrail.entrypoints=websecure"
      - "traefik.http.routers.edutrail.tls=true"
      - "traefik.http.services.edutrail.loadbalancer.server.port=5000"

volumes:
  postgres_data_prod:
  files_data:
  temp_files_data:

networks:
  edutrail-network-prod:
    driver: bridge