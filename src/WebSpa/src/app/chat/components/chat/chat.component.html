<div class="chat-panel">
  <div class="chat-header">
    Chat with {{ receiver?.studentName }}
  </div>

  <div class="chat-messages" #scrollContainer>
    <div *ngFor="let msg of messages" 
         [ngClass]="{'my-msg': msg.userId === user.id, 'their-msg': msg.userId !== user.id}">
      <div class="message-bubble">
        {{ msg.message }}
        <span class="msg-time">{{ msg.createdDate | date:'shortTime' }}</span>
      </div>
    </div>
  </div>

  <div class="chat-input">
    <input [(ngModel)]="message" placeholder="Type a message..." (keyup.enter)="send()" />
    <button (click)="send()"><i class="bi bi-send"></i></button>
  </div>
</div>
