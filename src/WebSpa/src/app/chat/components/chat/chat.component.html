<div class="chat-container">
  <div class="chat-header">
    <h4>{{ receiver?.studentName || 'Chat' }}</h4>
  </div>

  <div class="chat-messages" #messagesContainer>
    <div *ngFor="let msg of messages" 
         [ngClass]="{'my-message': msg.userId === user.id, 'other-message': msg.userId !== user.id}">
      <div class="message-user">{{ msg.userName }}</div>
      <div class="message-text">{{ msg.message }}</div>
      <div class="message-time">{{ msg.createdDate | date:'shortTime' }}</div>
    </div>
  </div>

  <div class="chat-input">
    <input type="text" [(ngModel)]="message" (keyup.enter)="send()" placeholder="Type a message..." />
    <button (click)="send()">Send</button>
  </div>
</div>
