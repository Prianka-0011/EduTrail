<div class="profile-layout">
  <aside class="sidebar2">
    <div class="user-info">
      <div>
        <div class="name">{{ userDetail.fullName }}</div>
        <div class="email">
          <p>{{ userDetail.email }}</p>
        </div>
      </div>
    </div>

    <nav class="menu">
      <ng-container *ngFor="let item of menu">
        <a *ngIf="!item.children?.length" [routerLink]="[item.route]" routerLinkActive="active">
          <i *ngIf="item.icon" class="{{ item.icon }}" style="margin-right: 0.5rem;"></i>
          {{ item.label }}
        </a>

        <div *ngIf="item.children?.length" class="menu-group">
          <div class="menu-label">
            <i *ngIf="item.icon" class="{{ item.icon }}" style="margin-right: 0.5rem;"></i>
            {{ item.label }}
          </div>
          <div class="submenu">
            <a *ngFor="let child of item.children" [routerLink]="[child.route]" routerLinkActive="active">
              <i *ngIf="child.icon" class="{{ child.icon }}" style="margin-right: 0.5rem;"></i>
              {{ child.label }}
            </a>
          </div>
        </div>
      </ng-container>
    </nav>
  </aside>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
