<div class="chnage-pass-out-layer">
    <div class="auth-container">
        <div class="row justify-content-center w-100">
            <div class="col-md-12">
                <h2 class="text-left mb-4">Change Password</h2>

                <form #changeForm="ngForm" (ngSubmit)="onSubmit()">

                    <div class="floating mb-3 position-relative">
                        <input type="email" id="email" name="email" class="form-control" [(ngModel)]="email"
                            #emailCtrl="ngModel" (focus)="isEmailFocused = true" (blur)="isEmailFocused = false"
                            [ngClass]="{ 'active': email || isEmailFocused }" required />
                        <label for="email">Email *</label>
                    </div>

                    <div class="text-danger small mb-3" *ngIf="emailCtrl.invalid && emailCtrl.touched">
                        *Please enter a valid email
                    </div>

                    <!-- New Password -->
                    <div class="floating mb-3 position-relative">
                        <input [type]="showNewPassword ? 'text' : 'password'" id="newPassword" name="newPassword"
                            class="form-control" [(ngModel)]="newPassword" (focus)="isNewFocused = true"
                            (blur)="isNewFocused = false" [ngClass]="{ 'active': newPassword || isNewFocused }"
                            #newPasswordCtrl="ngModel" required minlength="6" />
                        <label for="newPassword">New Password *</label>

                        <span class="eye-icon" (click)="showNewPassword = !showNewPassword">
                            <i class="bi" [ngClass]="showNewPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
                        </span>
                    </div>

                    <div class="text-danger small mb-3" *ngIf="newPasswordCtrl.invalid && newPasswordCtrl.touched">
                        *Password must be at least 6 characters
                    </div>

                    <!-- Confirm Password -->
                    <div class="floating mb-3 position-relative">
                        <input [type]="showConfirmPassword ? 'text' : 'password'" id="confirmPassword"
                            name="confirmPassword" class="form-control" [(ngModel)]="confirmPassword"
                            #confirmPasswordCtrl="ngModel" (focus)="isConfirmFocused = true"
                            (blur)="isConfirmFocused = false"
                            [ngClass]="{ 'active': confirmPassword || isConfirmFocused }" required />
                        <label for="confirmPassword">Confirm Password *</label>

                        <span class="eye-icon" (click)="showConfirmPassword = !showConfirmPassword">
                            <i class="bi" [ngClass]="showConfirmPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
                        </span>
                    </div>

                    <div class="text-danger small mb-3" *ngIf="confirmPassword && confirmPassword !== newPassword">
                        *Passwords do not match
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="btn btn-primary w-100"
                        [disabled]="changeForm.invalid || confirmPassword !== newPassword || isLoading">

                        <span *ngIf="!isLoading">Update Password</span>

                        <span *ngIf="isLoading">
                            <span class="spinner-border spinner-border-sm me-2"></span>
                            Updating...
                        </span>
                    </button>

                    <div class="text-end mb-3">
                         <a routerLink="/auth/sign-in" class="small">
                            Back to Sign In
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
