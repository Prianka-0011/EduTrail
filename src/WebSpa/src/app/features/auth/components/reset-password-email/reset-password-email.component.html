<div class="auth-container">
  <div class="row justify-content-center mt-5">
    <div class="col-md-12">
      <h2 class="text-left mb-4">Reset Password</h2>

      <form #resetForm="ngForm" (ngSubmit)="onSubmit()">

        <!-- Email -->
        <div class="floating mb-3">
          <input type="email" id="email" name="email" class="form-control" [(ngModel)]="email" #emailCtrl="ngModel"
            (focus)="isEmailFocused = true" (blur)="isEmailFocused = false"
            [ngClass]="{ 'active': email || isEmailFocused }" required email />
          <label for="email">Email *</label>
        </div>

        <div class="text-danger small mb-3" *ngIf="emailCtrl.invalid && emailCtrl.touched">
          *Valid email is required
        </div>

        <!-- Button -->
        <button type="submit" class="btn btn-primary w-100" [disabled]="resetForm.invalid || isLoading">
          <span *ngIf="!isLoading">Send Reset Link</span>

          <span *ngIf="isLoading">
            <span class="spinner-border spinner-border-sm me-2"></span>
            Sending...
          </span>
        </button>
        <div class="text-center mt-3">
          <a routerLink="auth/login" class="small text-decoration-none">
            Back to Sign In
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
